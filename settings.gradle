pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        flatDir {
            dirs "$rootDir/app/libs"
        }
        google()
        mavenCentral()
    }
}

include ':app'
include ':agent-core'
include ':agent-android'
include ':agent-screen-vision'
