<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 680" width="1500" height="680">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#dcf7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#16324f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#35798e"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
      .card { fill: #ffffff; stroke: #d4e2ee; stroke-width: 2; filter: url(#shadow); }
      .source { fill: #f4f9ff; stroke: #b9d7f1; stroke-width: 2; }
      .vision { fill: #f3fbf6; stroke: #b6dfc5; stroke-width: 2; }
      .core { fill: url(#core); stroke: #5aa6a7; stroke-width: 3; filter: url(#shadow); }
      .output { fill: #fff9ed; stroke: #efc46a; stroke-width: 2; }
      .label { font-size: 25px; font-weight: 700; fill: #17324d; }
      .sub { font-size: 17px; fill: #4b6175; }
      .tiny { font-size: 15px; fill: #5d7080; }
      .chip { fill: #ffffff; stroke: #c9d9e6; stroke-width: 1.5; }
      .chipText { font-size: 16px; fill: #24445e; font-weight: 600; }
      .note { font-size: 16px; fill: #46606e; }
      .accent { fill: #0f7b75; font-weight: 700; }
      .line { stroke: #35798e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .softLine { stroke: #9bb5c8; stroke-width: 2; fill: none; stroke-dasharray: 7 7; }
      .miniTitle { font-size: 18px; font-weight: 700; fill: #183852; }
      .miniBody { font-size: 14px; fill: #506575; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="680" fill="url(#bg)"/>

  <!-- Input layer -->
  <rect class="source" x="70" y="90" width="390" height="225" rx="28"/>
  <text class="label" x="105" y="135">Native View Tree</text>
  <text class="sub" x="105" y="170">来自系统 View 层级</text>
  <rect class="chip" x="105" y="198" width="150" height="36" rx="18"/>
  <text class="chipText" x="130" y="222">结构层级</text>
  <rect class="chip" x="270" y="198" width="150" height="36" rx="18"/>
  <text class="chipText" x="294" y="222">可点击性</text>
  <rect class="chip" x="105" y="246" width="150" height="36" rx="18"/>
  <text class="chipText" x="130" y="270">父子关系</text>
  <rect class="chip" x="270" y="246" width="150" height="36" rx="18"/>
  <text class="chipText" x="297" y="270">稳定 ID</text>

  <rect class="vision" x="70" y="365" width="390" height="225" rx="28"/>
  <text class="label" x="105" y="410">OCR / Screen Vision</text>
  <text class="sub" x="105" y="445">来自页面截图识别</text>
  <rect class="chip" x="105" y="473" width="150" height="36" rx="18"/>
  <text class="chipText" x="132" y="497">可见文本</text>
  <rect class="chip" x="270" y="473" width="150" height="36" rx="18"/>
  <text class="chipText" x="297" y="497">图标语义</text>
  <rect class="chip" x="105" y="521" width="150" height="36" rx="18"/>
  <text class="chipText" x="132" y="545">卡片区域</text>
  <rect class="chip" x="270" y="521" width="150" height="36" rx="18"/>
  <text class="chipText" x="297" y="545">视觉权重</text>

  <!-- Core fusion layer -->
  <rect class="core" x="540" y="105" width="435" height="470" rx="34"/>
  <text class="label" x="585" y="153">融合引擎</text>
  <text class="sub" x="585" y="188">把两类观测转成统一候选</text>

  <rect class="card" x="585" y="225" width="345" height="72" rx="18"/>
  <text class="miniTitle" x="610" y="252">1. 解析成中间信号</text>
  <text class="miniBody" x="610" y="278">NativeNode + VisionSignal，坐标归一</text>

  <rect class="card" x="585" y="315" width="345" height="72" rx="18"/>
  <text class="miniTitle" x="610" y="342">2. 匹配打分</text>
  <text class="miniBody" x="610" y="368">文本语义 + bounds 重叠 + role 兼容</text>

  <rect class="card" x="585" y="405" width="345" height="72" rx="18"/>
  <text class="miniTitle" x="610" y="432">3. 互为最佳匹配</text>
  <text class="miniBody" x="610" y="458">避免一个 OCR 文本绑定多个控件</text>

  <rect class="card" x="585" y="495" width="345" height="56" rx="18"/>
  <text class="miniTitle" x="610" y="530">4. 输出 fused / native / vision_only</text>

  <!-- Output layer -->
  <rect class="output" x="1060" y="90" width="370" height="250" rx="28"/>
  <text class="label" x="1095" y="135">hybridObservation</text>
  <text class="sub" x="1095" y="170">面向 Agent 的统一页面事实</text>
  <text class="note" x="1095" y="215">• actionableNodes：可执行候选</text>
  <text class="note" x="1095" y="247">• sections / listItems：区域和条目</text>
  <text class="note" x="1095" y="279">• conflicts：视觉噪声与风险提示</text>
  <text class="note" x="1095" y="311">• quality：融合质量摘要</text>

  <rect class="card" x="1060" y="390" width="370" height="200" rx="28"/>
  <text class="label" x="1095" y="435">Agent 消费</text>
  <text class="note" x="1095" y="480">候选归一：父容器 + 子文本 + 图标</text>
  <text class="note" x="1095" y="514">唯一高置信：本地 fast execute</text>
  <text class="note" x="1095" y="548">歧义或高风险：回退模型判断</text>

  <!-- Arrows -->
  <path class="line" d="M460 205 C500 205 505 235 540 265"/>
  <path class="line" d="M460 480 C505 480 505 430 540 390"/>
  <path class="line" d="M975 215 L1060 215"/>
  <path class="line" d="M975 490 L1060 490"/>

  <!-- Footer key idea -->
  <rect x="385" y="612" width="730" height="34" rx="17" fill="#16324f" opacity="0.92"/>
  <text x="750" y="635" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Native 决定“能不能点、点哪里”，OCR 补强“看见了什么、语义是什么”</text>
</svg>


