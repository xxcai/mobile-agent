<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__TITLE__</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }
    .hero {
      padding: 28px 20px 22px;
      background: linear-gradient(135deg, #1d4ed8, #38bdf8);
      color: white;
    }
    .hero small {
      display: block;
      opacity: 0.9;
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }
    .hero h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    .content {
      margin: 16px;
      padding: 20px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    .content h2 {
      margin-top: 0;
      font-size: 20px;
    }
    .content p {
      line-height: 1.7;
      color: #4b5563;
    }
    .stamp {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <section class="hero">
    <small>LOCAL HTML PAGE</small>
    <h1>__TITLE__</h1>
  </section>
  <section class="content">
    __CONTENT__
    <div class="stamp">__STAMP__</div>
  </section>
</body>
</html>
