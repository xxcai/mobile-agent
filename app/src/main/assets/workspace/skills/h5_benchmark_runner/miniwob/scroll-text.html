<!DOCTYPE html>
<html>
<head>
<title>Scroll Text Task</title>

<!-- stylesheets -->
<link rel="stylesheet" type="text/css" href="../core/core.css">
<style>
#area #text-area { margin-top: 2px; width: 150px; height: 95px; font-size: 10px; }
#answer-input { width: 150px; margin: 3px 0 3px 0; }
</style>

<!-- JS -->
<script src="../core/core.js"></script>
<script src="../core/d3.v3.min.js"></script>
<script src="../common/ui_utils.js"></script>

<script>
var genProblem = function() {
  // reset the UI
  document.getElementById('text-area').scrollTop = 0; // scroll up the text area
  document.getElementById('answer-input').value = '';

  var txt = ui_utils.generateWords(20,150);
  var words = txt.split(/[\s]/g);
  var expectedWord = words[words.length-1].replace('.', '');
  d3.select('#text-area').html(txt);

  // create the query
  d3.select('#query').html('Find the last word in the text area, enter it into the text field and hit Submit.');

  d3.select('#subbtn').on('click', function(){
    var ans = document.getElementById('answer-input').value;
    adjustedAnswer = ans.replace(/[^a-zA-Z0-9]/g, '');

    // don't penalize for whitespace or punctuation.
    var r = adjustedAnswer === expectedWord ? 1.0 : -1.0;
    core.endEpisode(r, r>0);
  });
}

window.onload = function() {
  core.startEpisode();
}
</script>
</head>
<body>
<div id="wrap">
  <div id="query"></div>
  <div id="area">
    <textarea id="text-area"></textarea>
    <input id="answer-input" type="text">
    <button id="subbtn" class="secondary-action">Submit</button>
  </div>
</div>

<script>
(function() {
  function extractAndLog() {
    var bid = 0;
    var lines = [];
    function traverse(node, indent) {
      if (!node) return;
      var name = node.nodeName;
      if (name === 'SCRIPT' || name === 'STYLE') return;
      bid++;
      var myBid = bid;
      node.setAttribute('data-bid', String(myBid));
      var tag = node.tagName ? node.tagName.toLowerCase() : '#text';
      var directText = '';
      for (var i = 0; i < node.childNodes.length; i++) {
        var ch = node.childNodes[i];
        if (ch.nodeType === 3) {
          var t = ch.textContent.trim();
          if (t) directText += t + ' ';
        }
      }
      directText = directText.trim().slice(0, 100);
      var prefix = '';
      for (var k = 0; k < indent; k++) prefix += '  ';
      var line = prefix + '[' + myBid + '] ' + tag;
      if (directText) line += " '" + directText + "'";
      if (node.id) line += ' id="' + node.id + '"';
      if (node.className) line += ' class="' + node.className + '"';
      lines.push(line);
      for (var j = 0; j < node.children.length; j++) {
        traverse(node.children[j], indent + 1);
      }
    }
    traverse(document.body, 0);
    console.log('[AXTree] === Android-format AXTree (500ms after load) ===');
    for (var i = 0; i < lines.length; i++) {
      console.log('[AXTree] ' + lines[i]);
    }
    console.log('[AXTree] === end ===');
  }
  window.addEventListener('load', function() {
    setTimeout(extractAndLog, 500);
  });
})();
</script>
</body>
