<!DOCTYPE html>
<html>
<head>
<title>Click Option Task</title>
<!-- stylesheets -->
<link rel="stylesheet" type="text/css" href="../core/core.css">
<link rel="stylesheet" href="../core/jquery-ui/jquery-ui.min.css">
<!-- JS -->
<script src="../core/core.js"></script>
<script src="../core/d3.v3.min.js"></script>
<script src="../common/ui_utils.js"></script>
<script src="../core/jquery-ui/external/jquery/jquery.js"></script>
<script src="../core/jquery-ui/jquery-ui.min.js"></script>

<style>
input { width: 20px; }
</style>

<script>
var createElements = function(div){
  var n = core.randi(2, 7);
  var clickNames = [];
  for(var i=0;i<n;i++) {
    var chname = ui_utils.generateString(2,8);
    var label = div.append('label')
    label.append('input').attr('type', 'radio').attr('id', 'ch'+i).attr('name', 'radio');
    label[0][0].innerHTML += chname;
    div.append('br');
    clickNames.push(chname);
  }
  var ix = core.randi(0, n);
  var qstr = clickNames[ix];
  return {query: qstr, index: ix};
}

var genProblem = function() {
  var div = d3.select('#boxes');
  div.html('');

  var correctElement = createElements(div);

  d3.select('#query').html('Select ' + correctElement.query + ' and click Submit.');

  d3.select('#subbtn').on('click', function(){
    var r = d3.select('#ch'+correctElement.index)[0][0].checked ? 1.0 : -1.0;
    core.endEpisode(r, r > 0);
  });
}

window.onload = function() {
  core.startEpisode();
}
</script>
</head>
<body>
<div id="wrap">
  <div id="query"></div>
  <div id="area">
    <div id="boxes"></div>
    <br>
    <button id="subbtn" class="secondary-action">Submit</button>
  </div>
</div>

<script>
(function() {
  function extractAndLog() {
    var bid = 0;
    var lines = [];
    function traverse(node, indent) {
      if (!node) return;
      var name = node.nodeName;
      if (name === 'SCRIPT' || name === 'STYLE') return;
      bid++;
      var myBid = bid;
      node.setAttribute('data-bid', String(myBid));
      var tag = node.tagName ? node.tagName.toLowerCase() : '#text';
      var directText = '';
      for (var i = 0; i < node.childNodes.length; i++) {
        var ch = node.childNodes[i];
        if (ch.nodeType === 3) {
          var t = ch.textContent.trim();
          if (t) directText += t + ' ';
        }
      }
      directText = directText.trim().slice(0, 100);
      var prefix = '';
      for (var k = 0; k < indent; k++) prefix += '  ';
      var line = prefix + '[' + myBid + '] ' + tag;
      if (directText) line += " '" + directText + "'";
      if (node.id) line += ' id="' + node.id + '"';
      if (node.className) line += ' class="' + node.className + '"';
      lines.push(line);
      for (var j = 0; j < node.children.length; j++) {
        traverse(node.children[j], indent + 1);
      }
    }
    traverse(document.body, 0);
    console.log('[AXTree] === Android-format AXTree (500ms after load) ===');
    for (var i = 0; i < lines.length; i++) {
      console.log('[AXTree] ' + lines[i]);
    }
    console.log('[AXTree] === end ===');
  }
  window.addEventListener('load', function() {
    setTimeout(extractAndLog, 500);
  });
})();
</script>
</body>
