<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Delayed Local Page</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .hero {
      padding: 24px 20px;
      background: linear-gradient(135deg, #0f766e, #2dd4bf);
      color: white;
    }
    .shell {
      margin: 16px;
      padding: 18px;
      border-radius: 18px;
      background: white;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #ccfbf1;
      color: #115e59;
      font-size: 12px;
    }
    .late {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: #ecfeff;
      border: 1px solid #a5f3fc;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="status">DELAYED RENDER PAGE</div>
    <h1 id="debug-title">Async Module</h1>
  </section>
  <section class="shell">
    <p>该页面会在 600ms 后插入一块动态 DOM，方便调试“页面已展示但 DOM 还未 ready”的链路。</p>
    <div id="late-container">waiting for async render...</div>
  </section>
  <script>
    setTimeout(function () {
      var container = document.getElementById('late-container');
      container.innerHTML =
        '<div class="late">' +
        '<h2 id="late-title">Delayed Content Ready</h2>' +
        '<button id="debug-submit" data-debug-action="submit">Async Submit</button>' +
        '</div>';
    }, 600);
  </script>
</body>
</html>
